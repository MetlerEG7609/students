<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BlackMoon - قائمة الطلاب</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #08080a;
            font-family: "Tajawal", sans-serif;
            color: #eeeef0;
            min-height: 100vh;
        }

        .bg-grid {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
            background-image:
                linear-gradient(rgba(255,255,255,0.015) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.015) 1px, transparent 1px);
            background-size: 60px 60px;
        }

        .glow {
            position: fixed;
            z-index: 0;
            pointer-events: none;
            border-radius: 50%;
            filter: blur(120px);
            animation: drift 20s ease-in-out infinite alternate;
        }

        .glow-1 {
            width: 500px;
            height: 500px;
            background: #00e676;
            top: -150px;
            right: -100px;
            opacity: 0.07;
        }

        .glow-2 {
            width: 400px;
            height: 400px;
            background: #00b0ff;
            bottom: -100px;
            left: -80px;
            opacity: 0.05;
            animation-delay: -10s;
        }

        @keyframes drift {
            0% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(30px, -20px) scale(1.1); }
            100% { transform: translate(-20px, 30px) scale(0.95); }
        }

        .container {
            position: relative;
            z-index: 1;
            max-width: 820px;
            margin: 0 auto;
            padding: 40px 20px 60px;
        }

        .header {
            text-align: center;
            margin-bottom: 36px;
            animation: slideDown 0.5s ease-out;
        }

        .brand {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 6px;
        }

        .brand-icon {
            width: 38px;
            height: 38px;
            background: rgba(0,230,118,0.1);
            border: 1px solid rgba(0,230,118,0.2);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #00e676;
            font-size: 1rem;
        }

        .brand-text {
            font-size: 1.4rem;
            font-weight: 800;
            color: #eeeef0;
        }

        .brand-text span {
            color: #00e676;
        }

        .subtitle {
            color: #55556a;
            font-size: 0.88rem;
        }

        .stats-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 24px;
            animation: slideDown 0.5s ease-out 0.05s both;
        }

        .stat-card {
            background: #151518;
            border: 1px solid #222228;
            border-radius: 12px;
            padding: 18px 16px;
            text-align: center;
            transition: 0.25s ease;
        }

        .stat-card:hover {
            border-color: #2a2a32;
            transform: translateY(-2px);
        }

        .stat-label {
            font-size: 0.75rem;
            color: #55556a;
            margin-bottom: 4px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .stat-num {
            font-size: 1.7rem;
            font-weight: 800;
            color: #00e676;
        }

        .token-box {
            background: #151518;
            border: 1px solid #222228;
            border-radius: 12px;
            padding: 22px;
            margin-bottom: 24px;
            animation: slideDown 0.5s ease-out 0.1s both;
        }

        .token-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 14px;
        }

        .token-title {
            font-size: 0.9rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: #55556a;
            transition: 0.25s ease;
        }

        .dot.active {
            background: #00e676;
            box-shadow: 0 0 8px rgba(0,230,118,0.4);
        }

        .gen-btn {
            background: #00e676;
            color: #000;
            border: none;
            font-family: "Tajawal", sans-serif;
            font-size: 0.82rem;
            font-weight: 700;
            padding: 7px 20px;
            border-radius: 6px;
            cursor: pointer;
            transition: 0.25s ease;
        }

        .gen-btn:hover {
            box-shadow: 0 4px 20px rgba(0,230,118,0.25);
            transform: translateY(-1px);
        }

        .gen-btn:active {
            transform: scale(0.97);
        }

        .token-body {
            display: none;
        }

        .token-val {
            background: #08080a;
            border: 1px solid #222228;
            border-radius: 8px;
            padding: 12px 14px;
            font-family: "JetBrains Mono", monospace;
            font-size: 0.85rem;
            color: #00e676;
            letter-spacing: 1px;
            word-break: break-all;
            direction: ltr;
            text-align: left;
            margin-bottom: 10px;
            line-height: 1.6;
            position: relative;
        }

        .mask {
            position: absolute;
            inset: 0;
            background: #08080a;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border-radius: 8px;
            transition: 0.25s ease;
            color: #8888a0;
            font-family: "Tajawal", sans-serif;
            font-size: 0.8rem;
            direction: rtl;
        }

        .mask:hover {
            background: rgba(8,8,10,0.85);
        }

        .token-btns {
            display: flex;
            gap: 6px;
        }

        .t-btn {
            background: #08080a;
            border: 1px solid #222228;
            color: #8888a0;
            font-family: "Tajawal", sans-serif;
            font-size: 0.78rem;
            font-weight: 500;
            padding: 6px 14px;
            border-radius: 6px;
            cursor: pointer;
            transition: 0.25s ease;
        }

        .t-btn:hover {
            border-color: #00e676;
            color: #00e676;
        }

        .t-btn.red:hover {
            border-color: #ff4466;
            color: #ff4466;
        }

        .search-box {
            margin-bottom: 18px;
            animation: slideDown 0.5s ease-out 0.15s both;
        }

        .search-wrap {
            position: relative;
        }

        .search-input {
            width: 100%;
            background: #151518;
            border: 1px solid #222228;
            border-radius: 10px;
            padding: 12px 40px 12px 14px;
            font-family: "Tajawal", sans-serif;
            font-size: 0.9rem;
            color: #eeeef0;
            outline: none;
            transition: 0.25s ease;
            direction: rtl;
        }

        .search-input::placeholder {
            color: #55556a;
        }

        .search-input:focus {
            border-color: #00e676;
            box-shadow: 0 0 0 3px rgba(0,230,118,0.1);
        }

        .s-icon {
            position: absolute;
            right: 13px;
            top: 50%;
            transform: translateY(-50%);
            color: #55556a;
            pointer-events: none;
            font-size: 0.85rem;
        }

        .s-clear {
            position: absolute;
            left: 10px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: #55556a;
            cursor: pointer;
            font-size: 0.8rem;
            padding: 3px 7px;
            border-radius: 4px;
            transition: 0.25s ease;
            display: none;
        }

        .s-clear:hover {
            color: #ff4466;
            background: rgba(255,68,102,0.1);
        }

        .table-card {
            background: #151518;
            border: 1px solid #222228;
            border-radius: 12px;
            overflow: hidden;
            animation: slideDown 0.5s ease-out 0.2s both;
        }

        .table-scroll {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 480px;
        }

        thead {
            position: sticky;
            top: 0;
            z-index: 2;
        }

        th {
            background: #111114;
            padding: 12px 16px;
            font-weight: 700;
            font-size: 0.78rem;
            color: #55556a;
            border-bottom: 1px solid #222228;
            text-align: right;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            user-select: none;
        }

        th.sorted {
            color: #00e676;
        }

        td {
            padding: 12px 16px;
            font-size: 0.9rem;
            border-bottom: 1px solid #1a1a1e;
            color: #eeeef0;
            transition: 0.2s ease;
        }

        tr:hover td {
            background: rgba(255,255,255,0.02);
        }

        tr:last-child td {
            border-bottom: none;
        }

        .c-idx {
            color: #55556a;
            font-size: 0.78rem;
            width: 40px;
        }

        .c-name {
            font-weight: 700;
        }

        .c-age {
            font-family: "JetBrains Mono", monospace;
            font-size: 0.82rem;
            color: #8888a0;
        }

        .c-addr {
            color: #8888a0;
            font-size: 0.85rem;
        }

        .empty {
            text-align: center;
            padding: 50px 20px;
            display: none;
        }

        .empty p {
            color: #55556a;
            font-size: 0.88rem;
        }

        .footer {
            text-align: center;
            margin-top: 36px;
            padding-top: 18px;
            border-top: 1px solid #222228;
            animation: slideDown 0.5s ease-out 0.25s both;
        }

        .footer p {
            color: #55556a;
            font-size: 0.75rem;
        }

        .footer span {
            color: #00e676;
            font-weight: 700;
        }

        .toast-box {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 9999;
            display: flex;
            flex-direction: column-reverse;
            gap: 6px;
            pointer-events: none;
        }

        .toast {
            background: #151518;
            border: 1px solid #222228;
            border-radius: 8px;
            padding: 10px 18px;
            font-family: "Tajawal", sans-serif;
            font-size: 0.82rem;
            color: #eeeef0;
            box-shadow: 0 8px 28px rgba(0,0,0,0.5);
            animation: toastIn 0.3s ease-out;
            pointer-events: auto;
            white-space: nowrap;
        }

        .toast.success {
            border-color: rgba(0,230,118,0.3);
        }

        .toast.error {
            border-color: rgba(255,68,102,0.3);
        }

        .toast.out {
            animation: toastOut 0.25s ease-in forwards;
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes toastIn {
            from { opacity: 0; transform: translateY(14px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        @keyframes toastOut {
            to { opacity: 0; transform: translateY(10px) scale(0.95); }
        }

        @media (max-width: 640px) {
            .container { padding: 24px 14px 40px; }
            .stats-row { grid-template-columns: 1fr; }
            .token-head { flex-direction: column; gap: 10px; align-items: flex-start; }
            th, td { padding: 10px 12px; font-size: 0.8rem; }
        }

        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 0.01ms !important;
                transition-duration: 0.01ms !important;
            }
        }

        ::-webkit-scrollbar { width: 5px; height: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #2a2a32; border-radius: 3px; }
    </style>
</head>

<body>

    <div class="bg-grid" aria-hidden="true"></div>
    <div class="glow glow-1" aria-hidden="true"></div>
    <div class="glow glow-2" aria-hidden="true"></div>

    <main class="container">

        <header class="header">
            <div class="brand">
                <div class="brand-icon" aria-hidden="true">&#9790;</div>
                <div class="brand-text">Black<span>Moon</span></div>
            </div>
            <p class="subtitle">نظام إدارة قائمة الطلاب</p>
        </header>

        <section class="stats-row" aria-label="إحصائيات">
            <div class="stat-card">
                <div class="stat-label">عدد الطلاب</div>
                <div class="stat-num" id="count">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">الحالة</div>
                <div class="stat-num" id="status" style="font-size:0.95rem;color:#00e676;">نشط</div>
            </div>
        </section>

        <section class="token-box" aria-label="رمز المصادقة">
            <div class="token-head">
                <div class="token-title">
                    <span class="dot" id="tokenDot"></span>
                    رمز المصادقة
                </div>
                <button class="gen-btn" id="tokenBtn" type="button">إنشاء رمز</button>
            </div>
            <div class="token-body" id="tokenDisplay">
                <div class="token-val" id="tokenBox">
                    <span id="tokenValue"></span>
                    <div class="mask" id="tokenMask">اضغط لإظهار الرمز</div>
                </div>
                <div class="token-btns">
                    <button class="t-btn" id="copyBtn" type="button">نسخ</button>
                    <button class="t-btn" id="toggleMaskBtn" type="button">إظهار</button>
                    <button class="t-btn red" id="revokeBtn" type="button">إلغاء</button>
                </div>
            </div>
        </section>

        <section class="search-box" aria-label="بحث">
            <div class="search-wrap">
                <input type="text" class="search-input" id="searchInput" placeholder="ابحث بالاسم أو العنوان..." autocomplete="off" aria-label="بحث في الطلاب">
                <span class="s-icon" aria-hidden="true">&#128269;</span>
                <button class="s-clear" id="searchClear" type="button" aria-label="مسح البحث">&#10005;</button>
            </div>
        </section>

        <section class="table-card" aria-label="قائمة الطلاب">
            <div class="table-scroll">
                <table role="table">
                    <thead>
                        <tr>
                            <th style="width:45px;">#</th>
                            <th data-sort="name">الاسم</th>
                            <th data-sort="age">العمر</th>
                            <th data-sort="address">العنوان</th>
                        </tr>
                    </thead>
                    <tbody id="tbody"></tbody>
                </table>
            </div>
            <div class="empty" id="emptyState">
                <p>لا توجد نتائج مطابقة</p>
            </div>
        </section>

        <footer class="footer">
            <p>مدعوم بتقنية <span>BlackMoon</span></p>
        </footer>

    </main>

    <div class="toast-box" id="toastContainer" aria-live="polite"></div>

    <script src="BlackMoon.js"></script>

</body>

</html>
